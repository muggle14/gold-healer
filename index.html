<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cosmic Alchemy — Garima Sharma</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&family=Cinzel+Decorative&family=Cinzel&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Jost',sans-serif;background:#FAF6F1;color:#2E1E45}

/* NAV */
.nav{position:fixed;top:0;width:100%;background:#FAF6F1;z-index:100;border-bottom:1px solid rgba(0,0,0,0.05)}
.nav-inner{max-width:1200px;margin:auto;display:flex;align-items:center;padding:0.6rem 2rem}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.nav-logo img{width:46px;height:46px;border-radius:50%}
.nav-logo-name{font-family:'Cinzel Decorative';font-size:1rem}
.nav-logo-sub{font-size:.6rem;color:#555}
.nav-menu{margin-left:auto;display:flex;gap:20px}
.nav-menu a{font-size:.7rem;text-transform:uppercase;cursor:pointer}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  background:url('sun-hero.png') center/cover no-repeat;
}

/* balanced overlay */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to right,
    rgba(255,235,200,0.5),
    rgba(255,255,255,0.15),
    rgba(200,180,255,0.4)
  );
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:700px;
}

.hero h1{
  font-family:'Cinzel Decorative';
  font-size:3rem;
  margin-bottom:.5rem;
}

.hero-subtitle{
  font-family:'Cormorant Garamond';
  font-size:1.3rem;
  color:#8A631D;
}

.hero-desc{
  margin:1rem 0 2rem;
  font-family:'Cormorant Garamond';
}

.h-btn{
  padding:10px 25px;
  border:1px solid #4A3066;
  margin:5px;
  cursor:pointer;
  background:white;
}

/* PAGE HEADER (moon fix) */
.page-header{
  margin-top:60px;
  height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  color:white;
  background:#2E1E45;
}

.page-header::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('moon-bg.png') center/cover no-repeat;
  opacity:.95;
}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* BASIC SECTIONS */
section{padding:60px 20px;text-align:center}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{font-size:2rem}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div class="nav-logo" onclick="showPage('home')">
      <img src="cosmic-logo.png">
      <div>
        <div class="nav-logo-name">The Cosmic Alchemy</div>
        <div class="nav-logo-sub">Celestial Guidance. Sovereign Truth.</div>
      </div>
    </div>

    <div class="nav-menu">
      <a onclick="showPage('home')">Home</a>
      <a onclick="showPage('about')">About</a>
      <a onclick="showPage('offerings')">Offerings</a>
    </div>
  </div>
</div>

<!-- HOME -->
<div class="page active" id="home">
  <section class="hero">
    <div class="hero-content">
      <h1>The Cosmic Alchemy</h1>
      <p class="hero-subtitle">Celestial Guidance. Sovereign Truth.</p>
      <p class="hero-desc">
        You have arrived by way of sacred gravity.<br>
        This is your invitation to remember.
      </p>

      <button class="h-btn">Explore Offerings</button>
      <button class="h-btn">Book Session</button>
    </div>
  </section>
</div>

<!-- ABOUT -->
<div class="page" id="about">
  <div class="page-header">
    <h1>About Me</h1>
  </div>
  <section>
    <p>Your about content here.</p>
  </section>
</div>

<!-- OFFERINGS -->
<div class="page" id="offerings">
  <div class="page-header">
    <h1>Offerings</h1>
  </div>
  <section>
    <p>Your offerings content here.</p>
  </section>
</div>

<script>
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
</script>

</body>
</html>
